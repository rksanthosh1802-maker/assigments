name: GitHub Pages

on:
  push:
    branches: [main]

permissions:
  pages: write
  id-token: write
  contents: read

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-web:
    name: Build WebGL build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Emscripten 3.1.64
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: "3.1.64"
          actions-cache-folder: .emsdk-cache

      # build_web.sh already passes -s MIN_WEBGL_VERSION=2 and fetches GLM,
      # so no flags need to be injected here.
      - name: Build the 3D Fan for WebGL
        run: bash build_web.sh

      - name: Assemble the site
        run: |
          mkdir -p site
          cp -r web/. site/

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

  deploy:
    name: Deploy to GitHub Pages
    needs: build-web
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5