name: Android

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: "Android • 3D Fan"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: android-actions/setup-android@v3

      - name: Install NDK and CMake
        run: |
          sdkmanager "ndk;27.0.12077973" "cmake;3.22.1" --sdk_root="${ANDROID_HOME}"

      # gradlew is not committed, so setup-gradle's `gradle-version: wrapper`
      # mode has no wrapper script to introspect and silently falls back to the
      # runner's default Gradle (9.x), which AGP 8.x is incompatible with.
      # Read the pinned version out of gradle-wrapper.properties and pass it in.
      - name: Read pinned Gradle version
        id: gradle_ver
        working-directory: android
        run: |
          VER=$(grep distributionUrl gradle/wrapper/gradle-wrapper.properties \
            | sed -E 's/.*gradle-([0-9.]+)-.*/\1/')
          if [ -z "$VER" ]; then
            echo "Could not parse Gradle version from gradle-wrapper.properties" >&2
            exit 1
          fi
          echo "Pinned Gradle version: $VER"
          echo "version=$VER" >> "$GITHUB_OUTPUT"

      - name: Setup Gradle (pinned to this project's wrapper version)
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: ${{ steps.gradle_ver.outputs.version }}
          build-root-directory: android
          cache-read-only: false

      - name: Write local.properties
        working-directory: android
        run: echo "sdk.dir=${ANDROID_HOME}" > local.properties

      - name: assembleDebug
        working-directory: android
        run: gradle assembleDebug --no-daemon --stacktrace

      - uses: actions/upload-artifact@v4
        with:
          name: apk-fan3d
          path: android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error